name: Frontend CI

on:
  push:
    branches: [main]
    # only when changes to the front-end folder are detected
    paths:
      - 'weather-api/front-end/**'

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: weather-api/front-end

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

